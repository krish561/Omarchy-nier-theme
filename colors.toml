# Core UI colors
accent = "#454138"                 # Ink as primary accent
cursor = "#454138"                 # Ink cursor
foreground = "#454138"             # Primary text
background = "#d1cdb7"             # YoRHa parchment background

selection_foreground = "#dcd8c0"   # Selected text
selection_background = "#454138"   # Ink selection

# --------------------------------------------------
# Base16-aligned 16-color palette (YoRHa Light)
# --------------------------------------------------

# base00–base07 (normal)
color0  = "#d1cdb7"  # base00 - Main background
color1  = "#8b2020"  # base08 - Error
color2  = "#454138"  # base0B - Success
color3  = "#7a6a3a"  # base0A - Warning
color4  = "#454138"  # base0D - Primary accent
color5  = "#5a5248"  # base0E - Secondary accent
color6  = "#6a6358"  # base0C - Informational
color7  = "#454138"  # base05 - Default foreground

# base08–base0F (bright)
color8  = "#bab5a1"  # base03 - Dim / inactive
color9  = "#8b2020"  # base08 - Bright error
color10 = "#5a5248"  # base0B - Bright success
color11 = "#7a6a3a"  # base0A - Bright warning
color12 = "#454138"  # base0D - Bright accent
color13 = "#5a5248"  # base0E - Bright secondary
color14 = "#6a6358"  # base0C - Bright info
color15 = "#1a1814"  # base07 - Highest contrast
