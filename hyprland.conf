# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgb(454138)

# ── General ──
general {
    col.active_border   = rgb(454138)
    col.inactive_border = rgba(bab5a1aa)
    border_size = 1
    gaps_in = 4
    gaps_out = 8
    layout = dwindle
}

# ── Decoration ──
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# ── Animations ──
animations {
    enabled = true
    bezier = niercurve, 0.4, 0, 0.2, 1
    animation = windows,    1, 4, niercurve, slide
    animation = windowsOut, 1, 3, niercurve, slide
    animation = fade,       1, 4, niercurve
    animation = workspaces, 1, 5, niercurve, slidevert
}

# ── Quickshell window rules ──
windowrule = float on,   match:class ^(quickshell)$
windowrule = pin on,     match:class ^(quickshell)$
windowrule = no_blur on, match:class ^(quickshell)$

# ── Nier menu ──
bind = SUPER, M, exec, echo t >> /tmp/qs-menu
